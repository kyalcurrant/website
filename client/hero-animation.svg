<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500" aria-hidden="true">
  <defs>
    <!-- Radial glow for chest -->
    <radialGradient id="chestGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#d97706" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0"/>
    </radialGradient>
    <!-- Mic glow -->
    <radialGradient id="micGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity="1"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <!-- Spotlight from above -->
    <radialGradient id="spotlight" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fef3c7" stop-opacity="0"/>
    </radialGradient>
    <!-- Stage floor gradient -->
    <linearGradient id="stageFloor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </linearGradient>
    <!-- Filter for glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="figureClip">
      <rect x="100" y="60" width="200" height="380"/>
    </clipPath>
  </defs>

  <style>
    /* ── Background ── */
    .bg { animation: bgPulse 8s ease-in-out infinite; }
    @keyframes bgPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    /* ── Spotlight ── */
    .spotlight { animation: spotlightFade 8s ease-in-out infinite; }
    @keyframes spotlightFade {
      0%, 20% { opacity: 0.3; }
      60%, 80% { opacity: 1; }
      100% { opacity: 0.3; }
    }

    /* ── Stage floor ── */
    .stage-floor { animation: stageReveal 8s ease-in-out infinite; }
    @keyframes stageReveal {
      0%, 30% { opacity: 0; }
      60%, 80% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ── Figure body ── */
    .figure-body { animation: postureShift 8s ease-in-out infinite; transform-origin: 200px 420px; }
    @keyframes postureShift {
      0% { transform: translateY(6px); }
      40% { transform: translateY(3px); }
      65%, 85% { transform: translateY(0px); }
      100% { transform: translateY(6px); }
    }

    /* ── Chest glow outer ── */
    .chest-outer { animation: chestOuter 8s ease-in-out infinite; }
    @keyframes chestOuter {
      0%, 100% { opacity: 0.2; r: 28; }
      15% { opacity: 0.35; r: 32; }
      30% { opacity: 0.55; r: 38; }
      55%, 70% { opacity: 0.9; r: 48; }
      85% { opacity: 0.6; r: 38; }
    }

    /* ── Chest glow inner ── */
    .chest-inner { animation: chestInner 8s ease-in-out infinite; }
    @keyframes chestInner {
      0%, 100% { opacity: 0.3; r: 14; }
      15% { opacity: 0.5; r: 16; }
      30% { opacity: 0.75; r: 20; }
      55%, 70% { opacity: 1; r: 26; }
      85% { opacity: 0.7; r: 20; }
    }

    /* ── Heartbeat pulse ring ── */
    .pulse-ring {
      animation: pulseRing 8s ease-in-out infinite;
      transform-origin: 200px 230px;
    }
    @keyframes pulseRing {
      0%, 10% { opacity: 0; transform: scale(0.8); }
      20% { opacity: 0.6; transform: scale(1); }
      30% { opacity: 0; transform: scale(1.5); }
      45% { opacity: 0; transform: scale(0.8); }
      55% { opacity: 0.8; transform: scale(1); }
      65% { opacity: 0; transform: scale(1.6); }
      100% { opacity: 0; transform: scale(0.8); }
    }

    /* ── Microphone shape ── */
    .mic-shape { animation: micReveal 8s ease-in-out infinite; }
    @keyframes micReveal {
      0%, 25% { opacity: 0; }
      40%, 75% { opacity: 1; }
      90%, 100% { opacity: 0; }
    }

    /* ── Mic light trail ── */
    .light-trail { animation: trailMove 8s ease-in-out infinite; }
    @keyframes trailMove {
      0%, 45% { opacity: 0; stroke-dashoffset: 120; }
      55% { opacity: 1; stroke-dashoffset: 0; }
      70% { opacity: 0.8; stroke-dashoffset: -30; }
      80%, 100% { opacity: 0; stroke-dashoffset: -60; }
    }

    /* ── Sound waves ── */
    .wave1 { animation: soundWave 8s ease-in-out infinite; transform-origin: 200px 230px; }
    .wave2 { animation: soundWave 8s ease-in-out infinite 0.3s; transform-origin: 200px 230px; }
    .wave3 { animation: soundWave 8s ease-in-out infinite 0.6s; transform-origin: 200px 230px; }
    @keyframes soundWave {
      0%, 50% { opacity: 0; transform: scale(0.6); }
      60% { opacity: 0.7; transform: scale(1); }
      75% { opacity: 0; transform: scale(1.4); }
      100% { opacity: 0; transform: scale(0.6); }
    }

    /* ── Audience silhouettes ── */
    .audience { animation: audienceFade 8s ease-in-out infinite; }
    @keyframes audienceFade {
      0%, 50% { opacity: 0; }
      68%, 82% { opacity: 0.45; }
      95%, 100% { opacity: 0; }
    }

    /* ── Abstract swirl lines ── */
    .swirl1 { animation: swirlAnim 8s ease-in-out infinite; }
    .swirl2 { animation: swirlAnim 8s ease-in-out infinite 0.4s; }
    @keyframes swirlAnim {
      0%, 15% { opacity: 0; stroke-dashoffset: 80; }
      28% { opacity: 0.7; stroke-dashoffset: 0; }
      42% { opacity: 0; stroke-dashoffset: -40; }
      100% { opacity: 0; stroke-dashoffset: 80; }
    }
  </style>

  <!-- No background rect: fully transparent, blends with hero image -->

  <!-- ── Stage floor (appears in beat 4-5) ── -->
  <g class="stage-floor">
    <rect x="0" y="430" width="400" height="4" fill="url(#stageFloor)" rx="2"/>
    <rect x="60" y="434" width="280" height="40" fill="#c9a84c" opacity="0.06" rx="2"/>
  </g>

  <!-- ── Audience silhouettes (beat 5) ── -->
  <g class="audience">
    <ellipse cx="60" cy="480" rx="22" ry="30" fill="#1a3a4a" opacity="0.8"/>
    <ellipse cx="110" cy="475" rx="20" ry="28" fill="#1a3a4a" opacity="0.8"/>
    <ellipse cx="155" cy="478" rx="18" ry="26" fill="#1a3a4a" opacity="0.8"/>
    <ellipse cx="200" cy="472" rx="22" ry="32" fill="#1a3a4a" opacity="0.8"/>
    <ellipse cx="245" cy="478" rx="18" ry="26" fill="#1a3a4a" opacity="0.8"/>
    <ellipse cx="290" cy="475" rx="20" ry="28" fill="#1a3a4a" opacity="0.8"/>
    <ellipse cx="340" cy="480" rx="22" ry="30" fill="#1a3a4a" opacity="0.8"/>
  </g>

  <!-- ── Figure (body, animated for posture) ── -->
  <g class="figure-body">
    <!-- Legs -->
    <rect x="172" y="370" width="22" height="70" rx="10" fill="#1e3a2e"/>
    <rect x="206" y="370" width="22" height="70" rx="10" fill="#1e3a2e"/>
    <!-- Torso -->
    <rect x="158" y="220" width="84" height="155" rx="20" fill="#1e3a2e"/>
    <!-- Left arm (slightly raised in beat 4-5) -->
    <rect x="128" y="228" width="32" height="90" rx="14" fill="#1e3a2e" transform-origin="144px 228px">
      <animateTransform attributeName="transform" type="rotate"
        values="4;2;0;-8;-8;4" keyTimes="0;0.2;0.4;0.6;0.8;1"
        dur="8s" repeatCount="indefinite" additive="sum"/>
    </rect>
    <!-- Right arm (holds mic in beat 4-5) -->
    <rect x="240" y="228" width="32" height="90" rx="14" fill="#1e3a2e" transform-origin="256px 228px">
      <animateTransform attributeName="transform" type="rotate"
        values="-4;-2;0;10;10;-4" keyTimes="0;0.2;0.4;0.6;0.8;1"
        dur="8s" repeatCount="indefinite" additive="sum"/>
    </rect>
    <!-- Neck -->
    <rect x="188" y="185" width="24" height="40" rx="10" fill="#1e3a2e"/>
    <!-- Head -->
    <ellipse cx="200" cy="160" rx="40" ry="44" fill="#1e3a2e"/>
    <!-- Subtle face: eyes -->
    <ellipse cx="188" cy="155" rx="4" ry="4.5" fill="#2a5040" opacity="0.7"/>
    <ellipse cx="212" cy="155" rx="4" ry="4.5" fill="#2a5040" opacity="0.7"/>
    <!-- Head tilt animation -->
    <animateTransform attributeName="transform" type="translate"
      values="0,6; 0,3; 0,0; 0,0; 0,0; 0,6" keyTimes="0;0.2;0.4;0.65;0.85;1"
      dur="8s" repeatCount="indefinite" additive="sum"
      attributeType="XML"/>
  </g>

  <!-- ── Chest glow layers ── -->
  <circle class="chest-outer" cx="200" cy="270" r="28" fill="url(#chestGlow)" filter="url(#strongGlow)"/>
  <circle class="chest-inner" cx="200" cy="270" r="14" fill="url(#micGlow)" filter="url(#glow)"/>

  <!-- ── Heartbeat pulse ring ── -->
  <circle class="pulse-ring" cx="200" cy="270" r="34" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0" filter="url(#softGlow)"/>

  <!-- ── Abstract swirl lines (beat 2 — story awakening) ── -->
  <path class="swirl1" d="M185 265 Q192 255 200 265 Q208 275 215 265" fill="none" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="80" stroke-dashoffset="80" opacity="0" filter="url(#softGlow)"/>
  <path class="swirl2" d="M182 275 Q191 260 200 272 Q209 284 218 272" fill="none" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="80" stroke-dashoffset="80" opacity="0" filter="url(#softGlow)"/>

  <!-- ── Microphone shape (beat 3-5) ── -->
  <g class="mic-shape" filter="url(#softGlow)">
    <!-- Mic capsule (rounded rectangle) -->
    <rect x="193" y="252" width="14" height="22" rx="7" fill="none" stroke="#fcd34d" stroke-width="2" opacity="0.95"/>
    <!-- Mic stand/body -->
    <line x1="200" y1="274" x2="200" y2="286" stroke="#fcd34d" stroke-width="2"/>
    <!-- Mic base arc -->
    <path d="M192 286 Q200 292 208 286" fill="none" stroke="#fcd34d" stroke-width="2"/>
    <!-- Inner mic glow dot -->
    <ellipse cx="200" cy="262" rx="4" ry="5" fill="#fef3c7" opacity="0.8"/>
  </g>

  <!-- ── Light trail from chest to hand (beat 4) ── -->
  <path class="light-trail"
    d="M200 270 Q230 280 252 300"
    fill="none" stroke="#fcd34d" stroke-width="2"
    stroke-dasharray="120" stroke-dashoffset="120"
    opacity="0" filter="url(#softGlow)"/>

  <!-- ── Sound waves (beat 4-5) ── -->
  <g>
    <path class="wave1" d="M178 255 Q168 265 178 275" fill="none" stroke="#f59e0b" stroke-width="1.8" opacity="0" filter="url(#softGlow)"/>
    <path class="wave2" d="M170 250 Q156 265 170 280" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0" filter="url(#softGlow)"/>
    <path class="wave3" d="M162 245 Q144 265 162 285" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0" filter="url(#softGlow)"/>
    <path class="wave1" d="M222 255 Q232 265 222 275" fill="none" stroke="#f59e0b" stroke-width="1.8" opacity="0" filter="url(#softGlow)"/>
    <path class="wave2" d="M230 250 Q244 265 230 280" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0" filter="url(#softGlow)"/>
    <path class="wave3" d="M238 245 Q256 265 238 285" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0" filter="url(#softGlow)"/>
  </g>

  <!-- ── Radiating halo lines around mic (beat 3) ── -->
  <g class="mic-shape" opacity="0.5">
    <line x1="200" y1="238" x2="200" y2="228" stroke="#fcd34d" stroke-width="1.2" filter="url(#softGlow)"/>
    <line x1="214" y1="242" x2="221" y2="234" stroke="#fcd34d" stroke-width="1.2" filter="url(#softGlow)"/>
    <line x1="186" y1="242" x2="179" y2="234" stroke="#fcd34d" stroke-width="1.2" filter="url(#softGlow)"/>
    <line x1="218" y1="255" x2="228" y2="252" stroke="#fcd34d" stroke-width="1.2" filter="url(#softGlow)"/>
    <line x1="182" y1="255" x2="172" y2="252" stroke="#fcd34d" stroke-width="1.2" filter="url(#softGlow)"/>
  </g>
</svg>
